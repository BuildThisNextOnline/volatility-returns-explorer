<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volatility &amp; Returns Explorer</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iNiIgZmlsbD0iIzBkMGYxMiIvPjxwYXRoIGQ9Ik0yIDE2IEM2IDE2IDYgNiAxMCA2IEMxNCA2IDE0IDI2IDE4IDI2IEMyMiAyNiAyMiAxNiAyNiAxNiBDMjggMTYgMjkgMTYgMzAgMTYiIHN0cm9rZT0iIzRhZGU4MCIgc3Ryb2tlLXdpZHRoPSIyLjUiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgZmlsbD0ibm9uZSIvPjwvc3ZnPg==">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0d0f12; --bg2:#13161b; --bg3:#1a1e25;
    --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
    --text:#e8eaed; --text2:#8b909a; --text3:#555a65;
    --green:#4ade80; --yellow:#fbbf24; --red:#f87171; --blue:#60a5fa;
    --mono:'DM Mono',monospace; --sans:'DM Sans',sans-serif;
  }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); font-size:14px; line-height:1.5; min-height:100vh; }

  /* HEADER */
  .hdr { padding:22px 32px 16px; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; justify-content:space-between; }
  .hdr h1 { font-size:20px; font-weight:500; letter-spacing:-0.3px; }
  .hdr p  { font-size:12px; color:var(--text2); margin-top:2px; font-family:var(--mono); }
  .hst { display:flex; align-items:center; gap:6px; font-family:var(--mono); font-size:11px; color:var(--text3); margin-top:4px; }
  .sdot { width:6px; height:6px; border-radius:50%; background:var(--text3); }
  .sdot.live { background:var(--green); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* DATA PANEL */
  .dpanel { padding:12px 32px 14px; border-bottom:1px solid var(--border); }
  .dp-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; flex-wrap:wrap; gap:10px; }
  .dp-ttl { font-family:var(--mono); font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:0.7px; }
  .dp-acts { display:flex; gap:6px; }
  .act-btn {
    padding:5px 13px; font-size:11px; font-family:var(--mono);
    border-radius:4px; cursor:pointer; transition:all 0.14s;
    border:1px solid var(--border2); background:transparent; color:var(--text2);
  }
  .act-btn:hover:not(:disabled) { background:var(--bg3); color:var(--text); }
  .act-btn.primary:hover:not(:disabled) { background:var(--green); border-color:var(--green); color:#0d0f12; }
  .act-btn:disabled { opacity:0.35; cursor:not-allowed; }

  .prog-bar { width:100%; height:2px; background:var(--border); border-radius:1px; overflow:hidden; margin-bottom:8px; }
  .prog-fill { height:100%; width:0%; background:var(--green); border-radius:1px; transition:width 0.35s; }

  /* GROUP + ASSET ROWS */
  .grp-lbl { font-family:var(--mono); font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:0.7px; padding:8px 2px 3px; display:block; grid-column:1/-1; }
  .grp-lbl:first-child { padding-top:0; }

  .asset-rows { display:flex; flex-direction:column; gap:2px; }
  .arow {
    display:flex; align-items:center; gap:8px;
    padding:4px 10px;
    background:var(--bg2); border:1px solid var(--border); border-left:3px solid var(--border);
    border-radius:4px; font-family:var(--mono); font-size:11px;
    transition:border-color 0.18s; white-space:nowrap; overflow:hidden;
  }
  .arow.ok      { border-left-color:var(--green); }
  .arow.fail    { border-left-color:var(--red); }
  .arow.fetching{ border-left-color:var(--yellow); }

  .rdot { width:7px; height:7px; border-radius:50%; background:var(--text3); flex-shrink:0; }
  .rdot.ok       { background:var(--green); }
  .rdot.fail     { background:var(--red); }
  .rdot.fetching { background:var(--yellow); animation:pulse 0.8s infinite; }

  .rname   { color:var(--text); font-size:11px; min-width:110px; }
  .rticker { color:var(--text3); font-size:10px; min-width:90px; }
  .rsta    { font-size:10px; color:var(--text3); margin-left:auto; padding-right:10px; }
  .rsta.ok       { color:var(--green); }
  .rsta.fail     { color:var(--red); }
  .rsta.fetching { color:var(--yellow); }

  .rfbtn {
    padding:2px 8px; font-size:10px; font-family:var(--mono);
    border:1px solid var(--border2); background:transparent; color:var(--text3);
    border-radius:3px; cursor:pointer; transition:all 0.12s; white-space:nowrap; flex-shrink:0;
  }
  .rfbtn:hover:not(:disabled) { border-color:var(--green); color:var(--green); }
  .rfbtn:disabled { opacity:0.3; cursor:not-allowed; }

  /* CHART CONTROLS */
  .ctrls { padding:12px 32px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
  .cg { display:flex; align-items:center; gap:8px; }
  .clbl { font-size:10px; color:var(--text3); font-family:var(--mono); text-transform:uppercase; letter-spacing:0.5px; }
  .bgrp { display:flex; gap:2px; }
  .cbtn {
    padding:5px 12px; font-size:11px; font-family:var(--mono);
    background:transparent; border:1px solid var(--border2); color:var(--text2);
    cursor:pointer; border-radius:4px; transition:all 0.14s; white-space:nowrap;
  }
  .cbtn:hover  { background:var(--bg3); color:var(--text); }
  .cbtn.active { background:var(--green); border-color:var(--green); color:#0d0f12; font-weight:500; }
  .vtab.active { background:var(--bg3); border-color:var(--border2); color:var(--text); border-bottom:2px solid var(--green); }

  /* ASSET FILTER BAR */
  .abar { padding:10px 32px; border-bottom:1px solid var(--border); display:flex; gap:5px; flex-wrap:wrap; align-items:center; min-height:40px; }
  .abar-lbl { font-size:10px; color:var(--text3); font-family:var(--mono); margin-right:4px; }
  .abtn {
    padding:3px 9px; font-size:10px; font-family:var(--mono);
    border-radius:3px; cursor:pointer; border:1px solid transparent; transition:all 0.12s; opacity:0.35;
  }
  .abtn.on { opacity:1; }

  /* MAIN */
  .main { padding:18px 32px 32px; }
  .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:8px; margin-bottom:14px; }
  .scard { background:var(--bg2); border:1px solid var(--border); border-radius:6px; padding:11px 13px; }
  .slbl  { font-size:10px; font-family:var(--mono); color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:3px; }
  .sval  { font-size:14px; font-weight:500; font-family:var(--mono); }
  .ssub  { font-size:10px; color:var(--text3); margin-top:2px; }
  .pos { color:var(--green); } .neg { color:var(--red); } .neu { color:var(--text2); }

  .chart-area { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:18px; }
  .chart-ttl  { font-size:10px; font-family:var(--mono); color:var(--text3); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:10px; }
  .legend { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:10px; }
  .legitem { display:flex; align-items:center; gap:5px; font-size:11px; font-family:var(--mono); color:var(--text2); cursor:pointer; transition:opacity 0.14s; }
  .legitem.hidden { opacity:0.22; }
  .legdot { width:10px; height:3px; border-radius:1px; }
  .note { font-size:10px; color:var(--text3); font-family:var(--mono); padding:7px 11px; background:var(--bg3); border-radius:4px; border-left:2px solid var(--border2); margin-top:10px; }

  canvas { display:block; }

  /* SCATTER TABLE */
  .stable { width:100%; border-collapse:collapse; font-family:var(--mono); font-size:11px; margin-top:14px; }
  .stable th { color:var(--text3); font-weight:400; text-align:left; padding:6px 8px; border-bottom:1px solid var(--border); }
  .stable td { padding:7px 8px; border-bottom:1px solid var(--border); color:var(--text2); }
  .stable tr:hover td { background:var(--bg3); }
  .csw { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:6px; vertical-align:middle; }
</style>
</head>
<body>

<div class="hdr">
  <div>
    <h1>Volatility &amp; Returns Explorer</h1>
    <p>Weekly data · Yahoo Finance · equities, bonds, commodities &amp; crypto</p>
    <div class="hst"><div class="sdot" id="sdot"></div><span id="stext">Ready — fetch data to begin</span></div>
  </div>
</div>

<div class="dpanel">
  <div class="dp-hdr">
    <span class="dp-ttl">Data Sources</span>
    <div class="dp-acts">
      <button class="act-btn" onclick="clearAll()">Clear all</button>
      <button class="act-btn primary" id="fetchAllBtn" onclick="fetchAll()">&#8595;&nbsp;Fetch all</button>
    </div>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
  <div class="asset-rows" id="assetRows"></div>
</div>

<div class="ctrls">
  <div class="cg">
    <span class="clbl">View</span>
    <div class="bgrp" id="viewTabs">
      <button class="cbtn vtab active" data-view="growth">Growth of $1</button>
      <button class="cbtn vtab" data-view="rolling">Rolling Return</button>
      <button class="cbtn vtab" data-view="volatility">Rolling Vol</button>
      <button class="cbtn vtab" data-view="drawdown">Drawdown</button>
      <button class="cbtn vtab" data-view="scatter">Risk vs Return</button>
    </div>
  </div>
  <div class="cg">
    <span class="clbl">Period</span>
    <div class="bgrp" id="periodBtns">
      <button class="cbtn" data-period="5">5Y</button>
      <button class="cbtn active" data-period="10">10Y</button>
      <button class="cbtn" data-period="15">Max</button>
    </div>
  </div>
</div>

<div class="abar" id="abar"><span class="abar-lbl">Show</span></div>

<div class="main">
  <div class="stats-row" id="statsRow"></div>
  <div class="chart-area">
    <div class="chart-ttl" id="chartTtl">—</div>
    <div class="legend" id="legendEl"></div>
    <div style="position:relative;height:440px;"><canvas id="mc"></canvas></div>
    <div class="note" id="chartNote"></div>
  </div>
</div>

<script>
// ── ASSETS ordered by importance ──────────────────────────────────────────
const ASSETS = [
  { key:'SP500',  label:'S&P 500',       ticker:'SPY',     color:'#4ade80', from:2010, group:'US Equity'             },
  { key:'NASDAQ', label:'NASDAQ',        ticker:'^IXIC',   color:'#22c55e', from:2010, group:'US Equity', dash:[5,3]  },
  { key:'NIFTY',  label:'Nifty 50 (₹)', ticker:'^NSEI',   color:'#e879f9', from:2013, group:'India'                  },
  { key:'NIFTYU', label:'Nifty 50 ($)', ticker:'^NSEI',   color:'#a855f7', from:2013, group:'India',     dash:[4,2], usdAdj:true },
  { key:'TLT',    label:'US Bonds',      ticker:'TLT',     color:'#60a5fa', from:2010, group:'Bonds'                  },
  { key:'GLD',    label:'Gold',          ticker:'GLD',     color:'#fbbf24', from:2010, group:'Commodities'            },
  { key:'SLV',    label:'Silver',        ticker:'SLV',     color:'#94a3b8', from:2010, group:'Commodities', dash:[4,2]},
  { key:'XLE',    label:'Energy',        ticker:'XLE',     color:'#f97316', from:2010, group:'Commodities', dash:[2,2]},
  { key:'COPPER', label:'Copper',        ticker:'HG=F',    color:'#c2410c', from:2010, group:'Commodities', dash:[6,3]},
  { key:'BTC',    label:'Bitcoin',       ticker:'BTC-USD', color:'#fb923c', from:2014, group:'Crypto'                 },
  { key:'ETH',    label:'Ethereum',      ticker:'ETH-USD', color:'#818cf8', from:2015, group:'Crypto',     dash:[3,3]  },
];
const USDINR_DEF = { key:'USDINR', label:'USD/INR rate', ticker:'INR=X', from:2013, color:'#555a65', group:'Support' };

const NOTES = {
  growth:    'Log scale. Indexed to 1.00 at each asset\'s earliest available date in the selected period.',
  rolling:   '52-week rolling annualised return computed from weekly adjusted close prices.',
  volatility:'52-week rolling annualised volatility (std dev of weekly log returns × √52). Higher = wilder swings.',
  drawdown:  'Percentage below rolling all-time high. Shows the cost of holding through downturns.',
  scatter:   'X = annualised volatility, Y = annualised return, both over selected period. Bubble size = years of data available.'
};

// ── STATE ─────────────────────────────────────────────────────────────────
let rawData    = {};
let activeView   = 'growth';
let activePeriod = 10;
let activeAssets = new Set(ASSETS.map(a => a.key));
let chartInst    = null;
let fetchingAll  = false;

// ── HELPERS ───────────────────────────────────────────────────────────────
function setStatus(t, live=false) {
  document.getElementById('stext').textContent = t;
  document.getElementById('sdot').className = 'sdot' + (live ? ' live' : '');
}

function updateProgress() {
  const base  = ASSETS.filter(a => !a.usdAdj);
  const total = base.length + 1; // +1 for USDINR
  const done  = [...base.map(a=>a.key), 'USDINR']
    .filter(k => rawData[k] && Object.keys(rawData[k]).length > 5).length;
  document.getElementById('progFill').style.width = Math.round(done / total * 100) + '%';
}

function setRowState(key, state, detail) {
  const row = document.getElementById('row-' + key); if (!row) return;
  if (state) row.className = 'arow ' + state;
  const dot = row.querySelector('.rdot');
  const sta = row.querySelector('.rsta');
  const btn = row.querySelector('.rfbtn');
  if (dot && state) dot.className = 'rdot ' + state;
  if (sta) { if (detail !== undefined) sta.textContent = detail; if (state) sta.className = 'rsta ' + state; }
  if (btn) btn.disabled = (state === 'fetching');
  updateProgress();
}

// ── BUILD DATA PANEL ──────────────────────────────────────────────────────
function buildDataPanel() {
  const container = document.getElementById('assetRows');
  container.innerHTML = '';

  const groups = {};
  ASSETS.filter(a => !a.usdAdj).forEach(a => {
    if (!groups[a.group]) groups[a.group] = [];
    groups[a.group].push(a);
  });
  groups['Support'] = [USDINR_DEF]; // needed to compute Nifty $

  Object.entries(groups).forEach(([grp, assets]) => {
    const lbl = document.createElement('span');
    lbl.className = 'grp-lbl';
    lbl.textContent = grp;
    container.appendChild(lbl);

    assets.forEach(asset => {
      const fromNote = asset.from > 2010 ? asset.from + '+' : '2010+';
      const row  = document.createElement('div');
      row.className = 'arow';
      row.id = 'row-' + asset.key;
      row.innerHTML =
        `<span class="rdot" id="dot-${asset.key}"></span>` +
        `<span class="rname" style="color:${asset.color}">${asset.label}</span>` +
        `<span class="rticker">${asset.ticker} · ${fromNote}</span>` +
        `<span class="rsta" id="sta-${asset.key}">—</span>` +
        `<button class="rfbtn" onclick="fetchOne('${asset.key}')">Fetch</button>`;
      container.appendChild(row);
    });
  });
}

// ── PARSE YAHOO RESPONSE ──────────────────────────────────────────────────
function parseYahoo(j) {
  const res    = j?.chart?.result?.[0]; if (!res) return null;
  const ts     = res.timestamps || res.timestamp;
  const closes = res.indicators?.adjclose?.[0]?.adjclose || res.indicators?.quote?.[0]?.close;
  if (!ts || !closes) return null;
  const out = {};
  ts.forEach((t, i) => { if (closes[i] != null && closes[i] > 0) out[t] = closes[i]; });
  return Object.keys(out).length > 10 ? out : null;
}

// ── FETCH ONE TICKER (tries 6 routes) ────────────────────────────────────
async function fetchTicker(ticker, fromYear) {
  const p1  = Math.floor(new Date(fromYear + '-01-01').getTime() / 1000);
  const p2  = Math.floor(Date.now() / 1000);
  const u   = q => `https://${q}.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1wk&period1=${p1}&period2=${p2}&events=history`;
  const u1  = u('query1'), u2 = u('query2');
  const T   = 16000;

  const labels = ['allorigins+q1','allorigins+q2','corsproxy+q1','corsproxy+q2','direct+q1','direct+q2'];
  const tries = [
    async () => { const r=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(u1)}`,{signal:AbortSignal.timeout(T)}); if(!r.ok) throw new Error('HTTP '+r.status); return parseYahoo(JSON.parse((await r.json()).contents)); },
    async () => { const r=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(u2)}`,{signal:AbortSignal.timeout(T)}); if(!r.ok) throw new Error('HTTP '+r.status); return parseYahoo(JSON.parse((await r.json()).contents)); },
    async () => { const r=await fetch(`https://corsproxy.io/?url=${encodeURIComponent(u1)}`,{signal:AbortSignal.timeout(T)}); if(!r.ok) throw new Error('HTTP '+r.status); return parseYahoo(await r.json()); },
    async () => { const r=await fetch(`https://corsproxy.io/?url=${encodeURIComponent(u2)}`,{signal:AbortSignal.timeout(T)}); if(!r.ok) throw new Error('HTTP '+r.status); return parseYahoo(await r.json()); },
    async () => { const r=await fetch(u1,{signal:AbortSignal.timeout(T)}); if(!r.ok) throw new Error('HTTP '+r.status); return parseYahoo(await r.json()); },
    async () => { const r=await fetch(u2,{signal:AbortSignal.timeout(T)}); if(!r.ok) throw new Error('HTTP '+r.status); return parseYahoo(await r.json()); },
  ];

  for (let i=0; i<tries.length; i++) {
    try { const d = await tries[i](); if (d) return d; }
    catch(e) { console.warn(`[VRE] ${ticker} via ${labels[i]}: ${e.message||e}`); }
  }
  console.error(`[VRE] ${ticker}: all 6 routes failed`);
  return null;
}

// ── COMPUTE NIFTY USD ─────────────────────────────────────────────────────
function computeNiftyUSD() {
  const nifty = rawData['NIFTY'], inr = rawData['USDINR'];
  if (!nifty || !inr) return;
  const inrTs = Object.keys(inr).map(Number).sort((a,b)=>a-b);
  const out   = {};
  Object.keys(nifty).map(Number).sort((a,b)=>a-b).forEach(t => {
    const c = inrTs.reduce((p,x) => Math.abs(x-t)<Math.abs(p-t)?x:p, inrTs[0]);
    if (inr[c] > 0) out[t] = nifty[t] / inr[c];
  });
  rawData['NIFTYU'] = Object.keys(out).length > 5 ? out : null;
}

// ── FETCH ONE ASSET ───────────────────────────────────────────────────────
async function fetchOne(key) {
  const isSupport = (key === 'USDINR');
  const def = isSupport ? USDINR_DEF : ASSETS.find(a => a.key === key);
  if (!def) return;

  setRowState(key, 'fetching', 'fetching...');
  const data = await fetchTicker(def.ticker, def.from);

  if (data) {
    rawData[key] = data;
    const pts = Object.keys(data).length;
    setRowState(key, 'ok', pts + ' weeks');
    if (key === 'NIFTY' || key === 'USDINR') computeNiftyUSD();
  } else {
    setRowState(key, 'fail', 'failed');
  }

  refreshChart();
}

// ── FETCH ALL — sequential, 1s gap between each ──────────────────────────
async function fetchAll() {
  if (fetchingAll) return;
  fetchingAll = true;
  document.getElementById('fetchAllBtn').disabled = true;

  const toFetch = [...ASSETS.filter(a => !a.usdAdj), USDINR_DEF];
  const delay   = ms => new Promise(r => setTimeout(r, ms));

  for (let i = 0; i < toFetch.length; i++) {
    const a = toFetch[i];
    setStatus(`Fetching ${a.label} (${i+1}/${toFetch.length})...`);
    await fetchOne(a.key);
    if (i < toFetch.length - 1) await delay(1000);
  }

  fetchingAll = false;
  document.getElementById('fetchAllBtn').disabled = false;
}

// ── CLEAR ALL ─────────────────────────────────────────────────────────────
function clearAll() {
  rawData = {};
  [...ASSETS.filter(a=>!a.usdAdj).map(a=>a.key), 'USDINR'].forEach(k => setRowState(k, '', '—'));
  document.getElementById('progFill').style.width = '0%';
  setStatus('Cleared');
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  document.getElementById('statsRow').innerHTML = '';
  document.getElementById('legendEl').innerHTML = '';
  document.getElementById('chartNote').textContent = '';
  document.getElementById('chartTtl').textContent = '—';
  document.querySelectorAll('.scatter-wrap').forEach(e => e.remove());
  buildAbar();
}

// ── REFRESH CHART ─────────────────────────────────────────────────────────
function refreshChart() {
  const loaded = ASSETS.filter(a => rawData[a.key] && Object.keys(rawData[a.key]).length > 5);
  if (!loaded.length) { setStatus('No data loaded yet'); return; }
  ASSETS.forEach(a => {
    const has = rawData[a.key] && Object.keys(rawData[a.key]).length > 5;
    if (!has) activeAssets.delete(a.key);
    else if (!activeAssets.has(a.key)) activeAssets.add(a.key);
  });
  buildAbar();
  const failed = ASSETS.filter(a=>!a.usdAdj).filter(a=>!rawData[a.key]||Object.keys(rawData[a.key]).length<=5).length;
  setStatus(loaded.length + ' / ' + ASSETS.filter(a=>!a.usdAdj).length + ' assets loaded' + (failed?` · ${failed} failed`:''), true);
  render();
}

// ── ASSET FILTER BAR ──────────────────────────────────────────────────────
function buildAbar() {
  const bar = document.getElementById('abar');
  bar.innerHTML = '<span class="abar-lbl">Show</span>';
  ASSETS.forEach(a => {
    if (!rawData[a.key] || Object.keys(rawData[a.key]).length < 5) return;
    const b = document.createElement('button');
    b.className = 'abtn' + (activeAssets.has(a.key) ? ' on' : '');
    b.textContent = a.label;
    b.style.borderColor = a.color;
    b.style.color = a.color;
    b.style.background = activeAssets.has(a.key) ? a.color + '22' : 'transparent';
    b.onclick = () => {
      if (activeAssets.has(a.key)) { if (activeAssets.size > 1) activeAssets.delete(a.key); }
      else activeAssets.add(a.key);
      buildAbar(); render();
    };
    bar.appendChild(b);
  });
}

// ── DATA SERIES HELPERS ───────────────────────────────────────────────────
function getTs(key, py) {
  const d = rawData[key]; if (!d) return [];
  const cut = Date.now()/1000 - py*365.25*86400;
  return Object.keys(d).map(Number).filter(t=>t>=cut).sort((a,b)=>a-b);
}
function fmt(ts) { const d=new Date(ts*1000); return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0'); }
function rgba(hex,a) { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; }

function sGrowth(key,py) {
  const ts=getTs(key,py),d=rawData[key]; if(!d||ts.length<2) return [];
  const base=d[ts[0]]; return ts.map(t=>({x:fmt(t),y:+(d[t]/base).toFixed(4)}));
}
function sRolling(key,py,w=52) {
  const ts=getTs(key,py),d=rawData[key]; if(!d||ts.length<w+1) return [];
  const out=[];
  for(let i=w;i<ts.length;i++){
    const p=ts.slice(i-w,i+1).map(t=>d[t]).filter(v=>v);
    if(p.length<w) continue;
    out.push({x:fmt(ts[i]),y:+((p[p.length-1]/p[0]-1)*100).toFixed(2)});
  }
  return out;
}
function sVol(key,py,w=52) {
  const ts=getTs(key,py),d=rawData[key]; if(!d||ts.length<w+2) return [];
  const lr=[];
  for(let i=1;i<ts.length;i++){const p0=d[ts[i-1]],p1=d[ts[i]];if(p0>0&&p1>0)lr.push({t:ts[i],v:Math.log(p1/p0)});}
  const out=[];
  for(let i=w-1;i<lr.length;i++){
    const sl=lr.slice(i-w+1,i+1).map(r=>r.v);
    const m=sl.reduce((s,v)=>s+v,0)/sl.length;
    const vr=sl.reduce((s,v)=>s+(v-m)**2,0)/(sl.length-1);
    out.push({x:fmt(lr[i].t),y:+(Math.sqrt(vr*52)*100).toFixed(2)});
  }
  return out;
}
function sDrawdown(key,py) {
  const ts=getTs(key,py),d=rawData[key]; if(!d||ts.length<2) return [];
  let peak=-Infinity;
  return ts.map(t=>{const v=d[t];if(!v)return null;if(v>peak)peak=v;return{x:fmt(t),y:+((v/peak-1)*100).toFixed(2)};}).filter(Boolean);
}
function sScatter(key,py) {
  const ts=getTs(key,py),d=rawData[key]; if(!d||ts.length<53) return null;
  const p=ts.map(t=>d[t]).filter(v=>v);
  const lr=[];
  for(let i=1;i<p.length;i++)if(p[i-1]>0&&p[i]>0)lr.push(Math.log(p[i]/p[i-1]));
  if(lr.length<2) return null;
  const m=lr.reduce((s,v)=>s+v,0)/lr.length;
  const vr=lr.reduce((s,v)=>s+(v-m)**2,0)/(lr.length-1);
  const years=(ts[ts.length-1]-ts[0])/(365.25*86400);
  return {
    x:+(Math.sqrt(vr*52)*100).toFixed(2),
    y:+(( Math.pow(p[p.length-1]/p[0],1/years)-1)*100).toFixed(2),
    years:+years.toFixed(1)
  };
}

// ── STATS ROW ────────────────────────────────────────────────────────────
function buildStats(py) {
  const row=document.getElementById('statsRow'); row.innerHTML='';
  const pts=ASSETS.filter(a=>activeAssets.has(a.key)).map(a=>({...a,...(sScatter(a.key,py)||{})})).filter(p=>p.x);
  if(!pts.length) return;
  const best=pts.reduce((a,b)=>b.y>a.y?b:a);
  const lv=pts.reduce((a,b)=>b.x<a.x?b:a);
  const sh=pts.reduce((a,b)=>(b.y/b.x)>(a.y/a.x)?b:a);
  const hv=pts.reduce((a,b)=>b.x>a.x?b:a);
  [{lbl:'Best return',val:best.label,sub:(best.y>0?'+':'')+best.y.toFixed(1)+'% ann.',cls:'pos'},
   {lbl:'Lowest vol',val:lv.label,sub:lv.x.toFixed(1)+'% ann. vol',cls:'neu'},
   {lbl:'Best risk-adj.',val:sh.label,sub:'Sharpe '+(sh.y/sh.x).toFixed(2),cls:'pos'},
   {lbl:'Highest vol',val:hv.label,sub:hv.x.toFixed(1)+'% ann. vol',cls:'neg'},
  ].forEach(c=>{
    const el=document.createElement('div'); el.className='scard';
    el.innerHTML=`<div class="slbl">${c.lbl}</div><div class="sval ${c.cls}">${c.val}</div><div class="ssub">${c.sub}</div>`;
    row.appendChild(el);
  });
}

// ── LEGEND ───────────────────────────────────────────────────────────────
function buildLegend(assets) {
  const el=document.getElementById('legendEl'); el.innerHTML='';
  assets.forEach(a=>{
    const item=document.createElement('div');
    item.className='legitem'+(activeAssets.has(a.key)?'':' hidden');
    item.innerHTML=`<span class="legdot" style="background:${a.color}"></span>${a.label}`;
    item.onclick=()=>{
      if(activeAssets.has(a.key)){if(activeAssets.size>1)activeAssets.delete(a.key);}
      else activeAssets.add(a.key);
      buildLegend(assets); buildAbar(); render();
    };
    el.appendChild(item);
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────
const TTip = { backgroundColor:'#1a1e25',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,titleColor:'#8b909a',bodyColor:'#e8eaed',padding:10 };

function render() {
  const py  = activePeriod;
  const vis = ASSETS.filter(a => activeAssets.has(a.key) && rawData[a.key]);

  document.getElementById('chartNote').textContent = NOTES[activeView];
  buildStats(py);
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  document.querySelectorAll('.scatter-wrap').forEach(e => e.remove());

  const titles = {
    growth:'Growth of $1 (Log Scale) · Weekly', rolling:'Rolling 52-week Return (%)',
    volatility:'Rolling 52-week Volatility (%)', drawdown:'Drawdown from Peak (%)',
    scatter:'Risk vs Return · Annualised'
  };
  document.getElementById('chartTtl').textContent = titles[activeView];

  const ctx = document.getElementById('mc').getContext('2d');
  if (!vis.length) { document.getElementById('legendEl').innerHTML=''; return; }

  if (activeView === 'scatter') {
    document.getElementById('legendEl').innerHTML='';
    const pts = vis.map(a=>({...a,pt:sScatter(a.key,py)})).filter(a=>a.pt);
    if (!pts.length) return;
    chartInst = new Chart(ctx, {
      type:'bubble',
      data:{ datasets: pts.map(a=>({
        label:a.label,
        data:[{x:a.pt.x,y:a.pt.y,r:Math.min(Math.max(a.pt.years*1.4,7),20)}],
        backgroundColor:rgba(a.color,0.55), borderColor:a.color, borderWidth:1.5
      }))},
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false}, tooltip:{...TTip,callbacks:{label:c=>`${c.dataset.label}: Vol ${c.raw.x.toFixed(1)}%  Ret ${c.raw.y.toFixed(1)}%`}} },
        scales:{
          x:{title:{display:true,text:'Annualised Volatility (%)',color:'#555a65',font:{size:11,family:'DM Mono'}},grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555a65',font:{size:10,family:'DM Mono'}}},
          y:{title:{display:true,text:'Annualised Return (%)',color:'#555a65',font:{size:11,family:'DM Mono'}},grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555a65',font:{size:10,family:'DM Mono'},callback:v=>v+'%'}}
        }
      }
    });
    const wrap=document.createElement('div'); wrap.className='scatter-wrap';
    wrap.innerHTML=`<table class="stable">
      <thead><tr><th>Asset</th><th>Ann. Vol</th><th>Ann. Return</th><th>Sharpe</th><th>Data</th></tr></thead>
      <tbody>${pts.sort((a,b)=>b.pt.y-a.pt.y).map(a=>`
        <tr><td><span class="csw" style="background:${a.color}"></span>${a.label}</td>
        <td>${a.pt.x.toFixed(1)}%</td>
        <td class="${a.pt.y>0?'pos':'neg'}">${a.pt.y>0?'+':''}${a.pt.y.toFixed(1)}%</td>
        <td>${(a.pt.y/a.pt.x).toFixed(2)}</td>
        <td>${a.pt.years.toFixed(1)}y</td></tr>`).join('')}
      </tbody></table>`;
    document.querySelector('.chart-area').appendChild(wrap);
    return;
  }

  buildLegend(vis);
  const datasets = vis.map(a => {
    const data = activeView==='growth'?sGrowth(a.key,py):activeView==='rolling'?sRolling(a.key,py):activeView==='volatility'?sVol(a.key,py):sDrawdown(a.key,py);
    return { label:a.label, data, borderColor:a.color, backgroundColor:'transparent', borderWidth:1.5, borderDash:a.dash||[], pointRadius:0, pointHoverRadius:3, tension:0.2, parsing:false };
  });

  chartInst = new Chart(ctx, {
    type:'line', data:{datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{...TTip,callbacks:{label:c=>{const v=c.parsed.y;return activeView==='growth'?` ${c.dataset.label}: ${v.toFixed(2)}x`:` ${c.dataset.label}: ${v>0?'+':''}${v.toFixed(1)}%`;}}}
      },
      scales:{
        x:{type:'category',ticks:{color:'#555a65',font:{size:10,family:'DM Mono'},maxTicksLimit:12,maxRotation:0},grid:{color:'rgba(255,255,255,0.04)'}},
        y:{type:activeView==='growth'?'logarithmic':'linear',grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555a65',font:{size:10,family:'DM Mono'},callback:v=>activeView==='growth'?v+'x':v+'%'}}
      }
    }
  });
}

// ── INIT ──────────────────────────────────────────────────────────────────
buildDataPanel();
buildAbar();

document.getElementById('viewTabs').addEventListener('click', e => {
  const t=e.target.closest('.vtab'); if(!t) return;
  document.querySelectorAll('.vtab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active'); activeView=t.dataset.view; render();
});
document.getElementById('periodBtns').addEventListener('click', e => {
  const t=e.target.closest('.cbtn[data-period]'); if(!t) return;
  document.querySelectorAll('#periodBtns .cbtn').forEach(x=>x.classList.remove('active'));
  t.classList.add('active'); activePeriod=Number(t.dataset.period); render();
});
</script>
